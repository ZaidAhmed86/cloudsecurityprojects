name: Container Scanning

on:
  push:
    paths:
      - '03-cicd-security-pipeline/app/**'
  pull_request:
    paths:
      - '03-cicd-security-pipeline/app/**'

jobs:
  trivy:
    name: Trivy Container Scan
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Build Docker image
        working-directory: 03-cicd-security-pipeline/app
        run: docker build -t sec-demo-app:${{ github.sha }} .

      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: sec-demo-app:${{ github.sha }}
          format: table
          exit-code: '1'
          severity: 'CRITICAL'
          ignore-unfixed: true