name: Secret Scanning

on:
  push:
    paths:
      - '03-cicd-security-pipeline/**'
  pull_request:
    paths:
      - '03-cicd-security-pipeline/**'

jobs:
  gitleaks:
    name: Scan for Secrets
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Run Gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}